<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicycling Science Power Flow</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar for the sankey diagram container */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- SVG Icons ---
        const CogIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/>
                <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                <path d="M12 2v2"/><path d="M12 20v2"/>
                <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
                <path d="M2 12h2"/><path d="M20 12h2"/>
                <path d="m4.93 19.07 1.41-1.41"/><path d="m17.66 6.34 1.41-1.41"/>
            </svg>
        );

        // --- Bike Data Definitions ---
        const BIKE_TYPES = {
            road: { 
                id: 'road', name: 'Road Bike (2x11)', 
                chainrings: [50, 34], 
                cassette: [11, 12, 13, 14, 16, 18, 21, 24, 28, 32], 
                circ: 2.136 // 700x28c
            },
            mtb: { 
                id: 'mtb', name: 'Mountain Bike (1x12)', 
                chainrings: [32], 
                cassette: [10, 12, 14, 16, 18, 21, 24, 28, 33, 39, 45, 51], 
                circ: 2.298 // 29x2.2
            },
            commuter: { 
                id: 'commuter', name: 'Commuter (1x8)', 
                chainrings: [42], 
                cassette: [11, 13, 15, 18, 21, 24, 28, 34], 
                circ: 2.168 // 700x35c
            }
        };

        // --- Animated Cyclist Component (Inverse Kinematics + Gearing) ---
        const AnimatedCyclist = ({ speed, grade, power, cda, cadence, frontTeeth, rearTeeth }) => {
            const tilt = Math.atan(grade / 100) * (180 / Math.PI);
            
            // Animation Refs for high-performance DOM manipulation
            const refs = {
                wheel1: useRef(null), wheel2: useRef(null), crank: useRef(null),
                chainTop: useRef(null), chainBottom: useRef(null),
                lLegSkin: useRef(null), lShort: useRef(null), lShoe: useRef(null),
                rLegSkin: useRef(null), rShort: useRef(null), rShoe: useRef(null),
                lArmSkin: useRef(null), lSleeve: useRef(null),
                rArmSkin: useRef(null), rSleeve: useRef(null),
                torso: useRef(null), head: useRef(null)
            };
            
            const paramsRef = useRef({ speed, cda, cadence, frontTeeth });
            useEffect(() => { paramsRef.current = { speed, cda, cadence, frontTeeth }; }, [speed, cda, cadence, frontTeeth]);

            useEffect(() => {
                let animationFrameId;
                let lastTime = performance.now();
                let angle = 0;
                let chainOffset = 0;

                // Inverse Kinematics Solver for 2-bone limbs
                const solveKinematics = (x1, y1, x2, y2, L1, L2, bendDir) => {
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const D = Math.sqrt(dx*dx + dy*dy);
                    const D_clamped = Math.min(D, L1 + L2 - 0.01);
                    const alpha = Math.acos((L1*L1 + D_clamped*D_clamped - L2*L2) / (2 * L1 * D_clamped));
                    const beta = Math.atan2(dy, dx);
                    const gamma = beta + (bendDir * alpha); 
                    return { x: x1 + L1 * Math.cos(gamma), y: y1 + L1 * Math.sin(gamma) };
                };

                const renderLoop = (time) => {
                    const deltaTime = time - lastTime;
                    lastTime = time;

                    const v = paramsRef.current.speed / 3.6; 
                    const wheelRps = v > 0 ? v / 2.1 : 0;
                    const pedalRps = paramsRef.current.cadence / 60;

                    angle += pedalRps * 2 * Math.PI * (deltaTime / 1000);
                    const wheelAngle = (time / 1000) * wheelRps * 360;
                    
                    const crRadius = paramsRef.current.frontTeeth * 0.22;
                    const chainLinearSpeed = pedalRps * 2 * Math.PI * crRadius;
                    chainOffset += chainLinearSpeed * (deltaTime / 1000);

                    const ccx = 90, ccy = 90;
                    const cr = 17; 
                    const femur = 42, tibia = 42; 
                    const upperArm = 34, lowerArm = 34;
                    const spine = 55;
                    
                    const baseHipX = 64;
                    const baseHipY = 22; 
                    const hipY = baseHipY + Math.sin(angle * 2) * 0.3; 

                    const t = Math.max(0, Math.min(1, (paramsRef.current.cda - 0.2) / 0.3));
                    const angleAero = 15 * (Math.PI / 180);
                    const angleUpright = -45 * (Math.PI / 180);
                    const torsoAngle = angleAero + t * (angleUpright - angleAero);
                    
                    const shX = baseHipX + spine * Math.cos(torsoAngle);
                    const shY = hipY + spine * Math.sin(torsoAngle);

                    const handX = 165 - t * 30;
                    const handY = 32 + (t < 0.5 ? t * 2 * 6 : 6); 

                    const rpx = ccx + cr * Math.cos(angle);
                    const rpy = ccy + cr * Math.sin(angle);
                    const lpx = ccx + cr * Math.cos(angle + Math.PI);
                    const lpy = ccy + Math.sin(angle + Math.PI); 

                    const rKnee = solveKinematics(baseHipX, hipY, rpx, rpy, femur, tibia, -1);
                    const lKnee = solveKinematics(baseHipX, hipY, ccx + cr * Math.cos(angle + Math.PI), ccy + cr * Math.sin(angle + Math.PI), femur, tibia, -1);
                    const elbow = solveKinematics(shX, shY, handX, handY, upperArm, lowerArm, 1);

                    const getShortEnd = (knee) => ({
                        x: baseHipX + (knee.x - baseHipX) * 0.65,
                        y: hipY + (knee.y - hipY) * 0.65
                    });
                    const rShortEnd = getShortEnd(rKnee);
                    const lShortEnd = getShortEnd(lKnee);

                    const sleeveEnd = {
                        x: shX + (elbow.x - shX) * 0.35,
                        y: shY + (elbow.y - shY) * 0.35
                    };

                    // DOM Updates
                    if (refs.crank.current) refs.crank.current.setAttribute('d', `M ${ccx + cr * Math.cos(angle + Math.PI)} ${ccy + cr * Math.sin(angle + Math.PI)} L ${rpx} ${rpy}`);
                    if (refs.wheel1.current) refs.wheel1.current.setAttribute('transform', `rotate(${wheelAngle})`);
                    if (refs.wheel2.current) refs.wheel2.current.setAttribute('transform', `rotate(${wheelAngle})`);
                    
                    if (refs.chainTop.current) refs.chainTop.current.setAttribute('stroke-dashoffset', -chainOffset);
                    if (refs.chainBottom.current) refs.chainBottom.current.setAttribute('stroke-dashoffset', chainOffset);

                    const lPedalX = ccx + cr * Math.cos(angle + Math.PI);
                    const lPedalY = ccy + cr * Math.sin(angle + Math.PI);
                    if (refs.lLegSkin.current) refs.lLegSkin.current.setAttribute('d', `M ${lShortEnd.x} ${lShortEnd.y} L ${lKnee.x} ${lKnee.y} L ${lPedalX} ${lPedalY}`);
                    if (refs.lShort.current) refs.lShort.current.setAttribute('d', `M ${baseHipX} ${hipY} L ${lShortEnd.x} ${lShortEnd.y}`);
                    if (refs.lShoe.current) refs.lShoe.current.setAttribute('d', `M ${lPedalX-7} ${lPedalY-4} L ${lPedalX+10} ${lPedalY-1} L ${lPedalX+12} ${lPedalY+4} L ${lPedalX-6} ${lPedalY+5} Z`);

                    if (refs.lArmSkin.current) refs.lArmSkin.current.setAttribute('d', `M ${sleeveEnd.x} ${sleeveEnd.y} L ${elbow.x} ${elbow.y} L ${handX} ${handY}`);
                    if (refs.lSleeve.current) refs.lSleeve.current.setAttribute('d', `M ${shX} ${shY} L ${sleeveEnd.x} ${sleeveEnd.y}`);
                    if (refs.rArmSkin.current) refs.rArmSkin.current.setAttribute('d', `M ${sleeveEnd.x} ${sleeveEnd.y} L ${elbow.x} ${elbow.y} L ${handX} ${handY}`);
                    if (refs.rSleeve.current) refs.rSleeve.current.setAttribute('d', `M ${shX} ${shY} L ${sleeveEnd.x} ${sleeveEnd.y}`);

                    if (refs.rLegSkin.current) refs.rLegSkin.current.setAttribute('d', `M ${rShortEnd.x} ${rShortEnd.y} L ${rKnee.x} ${rKnee.y} L ${rpx} ${rpy}`);
                    if (refs.rShort.current) refs.rShort.current.setAttribute('d', `M ${baseHipX} ${hipY} L ${rShortEnd.x} ${rShortEnd.y}`);
                    if (refs.rShoe.current) refs.rShoe.current.setAttribute('d', `M ${rpx-7} ${rpy-4} L ${rpx+10} ${rpy-1} L ${rpx+12} ${rpy+4} L ${rpx-6} ${rpy+5} Z`);

                    if (refs.torso.current) refs.torso.current.setAttribute('d', `M ${baseHipX} ${hipY} Q ${(baseHipX+shX)/2 + 8} ${(hipY+shY)/2 - 12} ${shX} ${shY}`);
                    
                    if (refs.head.current) {
                        const headDeg = (torsoAngle * 180 / Math.PI) + 40; 
                        refs.head.current.setAttribute('transform', `translate(${shX + 8}, ${shY - 14}) rotate(${headDeg})`);
                    }

                    animationFrameId = requestAnimationFrame(renderLoop);
                };
                animationFrameId = requestAnimationFrame(renderLoop);
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            let riderColor = "#2563eb"; 
            if (power > 450) riderColor = "#dc2626"; 
            else if (power > 300) riderColor = "#ea580c"; 
            else if (power > 180) riderColor = "#d97706"; 

            const skinColor = "#e7c09e";
            const shortColor = "#0f172a";

            const crRadius = frontTeeth * 0.22;
            const cgRadius = rearTeeth * 0.22;

            return (
                <div className="bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-center overflow-hidden relative h-64 sm:h-80 w-full">
                    <div className="absolute inset-0 pointer-events-none overflow-hidden">
                        <style>
                            {`@keyframes move-wind { from { transform: translateX(120%); } to { transform: translateX(-120%); } }`}
                        </style>
                        {speed > 5 && [1,2,3].map(i => (
                            <div key={i} className="absolute h-[1px] bg-slate-300 opacity-60" 
                                style={{ top: `${i * 30}%`, width: '40%', left: '100%', animation: `move-wind ${15 / (speed/3.6)}s linear infinite`, animationDelay: `${i * -0.4}s`}}></div>
                        ))}
                    </div>

                    <div className="relative z-10 w-full h-full flex justify-center items-center">
                        <svg viewBox="10 -20 180 150" className="w-full h-full max-h-72 overflow-visible">
                            <g style={{ transform: `rotate(${-tilt}deg)`, transformOrigin: '90px 90px', transition: 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)' }}>
                                <line x1="-200" y1="120" x2="400" y2="120" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="10 10" />
                                
                                <g transform="translate(35, 90)">
                                    <g ref={refs.wheel1}>
                                        <circle cx="0" cy="0" r="30" fill="none" stroke="#1e293b" strokeWidth="3" /> 
                                        <circle cx="0" cy="0" r="28" fill="none" stroke="#64748b" strokeWidth="1" />
                                        {[0, 30, 60, 90, 120, 150].map(deg => (
                                            <line key={deg} x1="0" y1="-28" x2="0" y2="28" stroke="#cbd5e1" strokeWidth="0.5" transform={`rotate(${deg})`} />
                                        ))}
                                    </g>
                                </g>
                                <g transform="translate(155, 90)">
                                    <g ref={refs.wheel2}>
                                        <circle cx="0" cy="0" r="30" fill="none" stroke="#1e293b" strokeWidth="3" />
                                        <circle cx="0" cy="0" r="28" fill="none" stroke="#64748b" strokeWidth="1" />
                                        {[0, 30, 60, 90, 120, 150].map(deg => (
                                            <line key={deg} x1="0" y1="-28" x2="0" y2="28" stroke="#cbd5e1" strokeWidth="0.5" transform={`rotate(${deg})`} />
                                        ))}
                                    </g>
                                </g>

                                <g stroke="#334155" strokeLinecap="round" strokeLinejoin="round" fill="none">
                                    <path d="M 35 90 L 90 90" strokeWidth="4" />
                                    <path d="M 35 90 L 68 45" strokeWidth="3.5" />
                                    <path d="M 90 90 L 68 45 L 135 35 L 90 90" strokeWidth="5.5" />
                                    <path d="M 140 50 L 155 90" strokeWidth="4.5" />
                                </g>

                                <g stroke="#1e293b" strokeWidth="3.5" fill="none" strokeLinecap="round">
                                    <path d="M 135 35 L 145 35" />
                                    <path d="M 145 35 Q 160 35 155 50" />
                                    <path d="M 145 35 L 155 35" strokeWidth="2" />
                                </g>

                                <g stroke="#64748b" fill="none">
                                    <line ref={refs.chainTop} x1="35" y1={90 - cgRadius} x2="90" y2={90 - crRadius} strokeWidth="1.5" strokeDasharray="3 2" />
                                    <line ref={refs.chainBottom} x1="35" y1={90 + cgRadius} x2="90" y2={90 + crRadius} strokeWidth="1.5" strokeDasharray="3 2" />
                                    <circle cx="90" cy="90" r={crRadius} strokeWidth="2.5" />
                                    <circle cx="35" cy="90" r={cgRadius} strokeWidth="2.5" />
                                </g>

                                <line x1="68" y1="45" x2="62" y2="30" stroke="#1e293b" strokeWidth="3" />
                                <path d="M 52 32 L 72 30 Q 75 30 75 33 L 68 34 Z" fill="#0f172a" />

                                <path ref={refs.lArmSkin} stroke={skinColor} strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.6" />
                                <path ref={refs.lSleeve} stroke={riderColor} strokeWidth="8.5" strokeLinecap="round" fill="none" opacity="0.6" />
                                <path ref={refs.lLegSkin} stroke={skinColor} strokeWidth="9" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.6" />
                                <path ref={refs.lShort} stroke={shortColor} strokeWidth="12" strokeLinecap="round" fill="none" opacity="0.8" />
                                <path ref={refs.lShoe} fill="#f8fafc" stroke="#cbd5e1" strokeLinejoin="round" opacity="0.8" />
                                
                                <circle cx="90" cy="90" r="4" fill="#0f172a" />
                                <path ref={refs.crank} stroke="#0f172a" strokeWidth="3.5" strokeLinecap="round" fill="none" />

                                <path ref={refs.rLegSkin} stroke={skinColor} strokeWidth="9.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                                <path ref={refs.rShort} stroke={shortColor} strokeWidth="13" strokeLinecap="round" fill="none" />
                                <path ref={refs.rShoe} fill="#ffffff" stroke="#94a3b8" strokeLinejoin="round" />
                                
                                <path ref={refs.torso} stroke={riderColor} strokeWidth="18" strokeLinecap="round" fill="none" />
                                
                                <path ref={refs.rArmSkin} stroke={skinColor} strokeWidth="7.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                                <path ref={refs.rSleeve} stroke={riderColor} strokeWidth="9" strokeLinecap="round" fill="none" />
                                
                                <g ref={refs.head}>
                                    <circle cx="0" cy="0" r="7.5" fill={skinColor} />
                                    <path d="M -1 -2 Q 5 -3 8 -1 Q 5 2 -1 0 Z" fill="#0f172a" />
                                    <path d="M 6 -4 C 4 -14, -10 -15, -25 4 Q -10 10, -5 6 L 6 -4 Z" fill="#334155" />
                                </g>
                            </g>
                        </svg>
                    </div>
                    
                    <div className="absolute bottom-3 left-3 flex gap-2">
                        <div className="bg-white/90 backdrop-blur px-2 py-1 rounded border border-slate-200 text-xs font-semibold text-slate-600 shadow-sm">
                            {grade.toFixed(1)}% Slope
                        </div>
                        <div className="bg-white/90 backdrop-blur px-2 py-1 rounded border border-slate-200 text-xs font-semibold text-slate-600 shadow-sm flex items-center gap-1">
                            <CogIcon className="w-3 h-3" /> {frontTeeth} x {rearTeeth}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            // Environmental / Physics State
            const [speed, setSpeed] = useState(32);
            const [grade, setGrade] = useState(0);
            const [mass, setMass] = useState(82);
            const [cda, setCda] = useState(0.32);
            const [crr, setCrr] = useState(0.0045);
            const [efficiency, setEfficiency] = useState(97);
            const [rho, setRho] = useState(1.225);
            const [humanEfficiency, setHumanEfficiency] = useState(23.5);

            // Gearing State
            const [bikeId, setBikeId] = useState('road');
            const [shiftMode, setShiftMode] = useState('auto'); 
            const [targetCadence, setTargetCadence] = useState(90);
            const [manualFrontIdx, setManualFrontIdx] = useState(0);
            const [manualRearIdx, setManualRearIdx] = useState(5);

            const presets = [
                { name: "TT Aero", bike: 'road', speed: 45, grade: 0, mass: 80, cda: 0.22, crr: 0.003, efficiency: 98, rho: 1.225, humanEff: 24 },
                { name: "Pro Climb", bike: 'road', speed: 18, grade: 9, mass: 68, cda: 0.35, crr: 0.004, efficiency: 97, rho: 1.15, humanEff: 23 },
                { name: "MTB Trail", bike: 'mtb', speed: 16, grade: 4, mass: 88, cda: 0.48, crr: 0.012, efficiency: 93, rho: 1.225, humanEff: 22 },
                { name: "Commuter", bike: 'commuter', speed: 22, grade: 0, mass: 95, cda: 0.55, crr: 0.007, efficiency: 94, rho: 1.225, humanEff: 22 },
            ];

            const applyPreset = (p) => {
                setBikeId(p.bike);
                setManualFrontIdx(0); setManualRearIdx(5); 
                setSpeed(p.speed); setGrade(p.grade); setMass(p.mass);
                setCda(p.cda); setCrr(p.crr); setEfficiency(p.efficiency); setRho(p.rho);
                setHumanEfficiency(p.humanEff);
            };

            const activeGear = useMemo(() => {
                const bike = BIKE_TYPES[bikeId];
                
                if (shiftMode === 'manual') {
                    const fIdx = Math.min(manualFrontIdx, bike.chainrings.length - 1);
                    const rIdx = Math.min(manualRearIdx, bike.cassette.length - 1);
                    return { crIdx: fIdx, cogIdx: rIdx };
                }

                if (speed === 0) return { crIdx: 0, cogIdx: bike.cassette.length - 1 }; 

                let bestDiff = Infinity;
                let bestCr = 0;
                let bestCog = 0;

                bike.chainrings.forEach((cr, i) => {
                    bike.cassette.forEach((cg, j) => {
                        const ratio = cr / cg;
                        const cad = (speed * 1000) / (60 * ratio * bike.circ);
                        const diff = Math.abs(cad - targetCadence);
                        if (diff < bestDiff) {
                            bestDiff = diff;
                            bestCr = i;
                            bestCog = j;
                        }
                    });
                });

                return { crIdx: bestCr, cogIdx: bestCog };
            }, [bikeId, shiftMode, manualFrontIdx, manualRearIdx, speed, targetCadence]);

            const currentBike = BIKE_TYPES[bikeId];
            const frontTeeth = currentBike.chainrings[activeGear.crIdx];
            const rearTeeth = currentBike.cassette[activeGear.cogIdx];
            const gearRatio = frontTeeth / rearTeeth;
            const actualCadence = speed === 0 ? 0 : (speed * 1000) / (60 * gearRatio * currentBike.circ);

            const physics = useMemo(() => {
                const v = speed / 3.6;
                const g = 9.81;
                const pAir = 0.5 * rho * cda * Math.pow(v, 3);
                const theta = Math.atan(grade / 100);
                const pRoll = mass * g * Math.cos(theta) * crr * v;
                const pGrav = mass * g * Math.sin(theta) * v;
                
                const pGravSource = pGrav < 0 ? Math.abs(pGrav) : 0;
                const pGravSink = pGrav > 0 ? pGrav : 0;
                const dragSinks = pAir + pRoll + pGravSink;
                const effDecimal = efficiency / 100;

                let pRider = 0, pLoss = 0, pBrake = 0;
                if (pGravSource >= dragSinks) {
                    pBrake = pGravSource - dragSinks;
                } else {
                    const pWheelReq = dragSinks - pGravSource;
                    pRider = pWheelReq / effDecimal;
                    pLoss = pRider - pWheelReq;
                }

                const pMetabolic = pRider > 0 ? pRider / (humanEfficiency / 100) : 0;
                const pBodyHeat = pMetabolic - pRider;

                return { pAir, pRoll, pGravSource, pGravSink, pRider, pLoss, pBrake, pMetabolic, pBodyHeat, totalWatts: pRider };
            }, [speed, grade, mass, cda, crr, efficiency, rho, humanEfficiency]);

            const sankey = useMemo(() => {
                const width = 800, height = 360, nodeWidth = 24, gap = 16;
                let sources = [
                    { id: 'metabolic', name: 'Metabolic Input', val: physics.pMetabolic, color: '#f97316' },
                    { id: 'gravSrc', name: 'Gravity Assist', val: physics.pGravSource, color: '#10b981' }
                ].filter(s => s.val > 0.5);

                let sinks = [
                    { id: 'bodyHeat', name: 'Body Heat', val: physics.pBodyHeat, color: '#fca5a5' },
                    { id: 'loss', name: 'Drivetrain Loss', val: physics.pLoss, color: '#94a3b8' },
                    { id: 'air', name: 'Air Resistance', val: physics.pAir, color: '#38bdf8' },
                    { id: 'roll', name: 'Rolling Res.', val: physics.pRoll, color: '#fbbf24' },
                    { id: 'gravSnk', name: 'Gravity Climb', val: physics.pGravSink, color: '#f87171' },
                    { id: 'brake', name: 'Brake Heat', val: physics.pBrake, color: '#ef4444' }
                ].filter(s => s.val > 0.5);

                const totalSource = sources.reduce((a, b) => a + b.val, 0);
                const totalSink = sinks.reduce((a, b) => a + b.val, 0);
                const scale = (height - (Math.max(sources.length, sinks.length) * gap)) / Math.max(totalSource, totalSink, 1);

                let sy = gap, ky = gap;
                sources.forEach(s => { s.y = sy; s.used = 0; sy += (s.val * scale) + gap; });
                sinks.forEach(s => { s.y = ky; s.filled = 0; ky += (s.val * scale) + gap; });

                let links = [];
                sources.forEach(src => {
                    sinks.forEach(snk => {
                        const amount = Math.min(src.val - src.used, snk.val - snk.filled);
                        if (amount > 0.1) {
                            links.push({
                                y1: src.y + (src.used * scale),
                                y2: snk.y + (snk.filled * scale),
                                h: amount * scale,
                                color: snk.color,
                                val: amount
                            });
                            src.used += amount; snk.filled += amount;
                        }
                    });
                });

                return { sources, sinks, links, width, height, nodeWidth, scale };
            }, [physics]);

            return (
                <div className="min-h-screen bg-white text-slate-800 font-sans p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        <header className="border-b border-slate-200 pb-4 mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900 tracking-tight">Cycling Power Dynamics</h1>
                                <p className="text-slate-500 mt-1">Interactive physics and drivetrain mechanics</p>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {presets.map((p, i) => (
                                    <button key={i} onClick={() => applyPreset(p)} className="px-3 py-1.5 bg-slate-100 hover:bg-blue-50 border border-slate-200 hover:border-blue-200 rounded text-xs font-semibold text-slate-600 hover:text-blue-700 transition-colors">
                                        {p.name}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <aside className="lg:col-span-4 space-y-6">
                                
                                <div className="bg-blue-50/50 p-6 rounded-xl border border-blue-100 space-y-5">
                                    <div className="flex items-center justify-between border-b border-blue-100 pb-2">
                                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wide flex items-center gap-2">
                                            <CogIcon className="w-4 h-4 text-blue-600" /> Drivetrain
                                        </h3>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <div className="space-y-1 text-sm">
                                            <label className="font-medium text-slate-700">Bike Profile</label>
                                            <select 
                                                value={bikeId} 
                                                onChange={(e) => {
                                                    setBikeId(e.target.value);
                                                    setManualFrontIdx(0); setManualRearIdx(5);
                                                }}
                                                className="w-full bg-white border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                            >
                                                {Object.values(BIKE_TYPES).map(b => (
                                                    <option key={b.id} value={b.id}>{b.name}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => setShiftMode('auto')}
                                                className={`flex-1 py-2 md:py-1.5 rounded-md text-sm md:text-xs font-semibold border transition-colors ${shiftMode === 'auto' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}
                                            >Auto Shift</button>
                                            <button 
                                                onClick={() => setShiftMode('manual')}
                                                className={`flex-1 py-2 md:py-1.5 rounded-md text-sm md:text-xs font-semibold border transition-colors ${shiftMode === 'manual' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}
                                            >Manual Mode</button>
                                        </div>

                                        {shiftMode === 'auto' ? (
                                            <div className="space-y-1 bg-white p-4 rounded border border-slate-200 shadow-sm">
                                                <div className="flex justify-between text-xs">
                                                    <span className="font-medium text-slate-600">Target Cadence</span>
                                                    <span className="font-bold text-slate-900">{targetCadence} RPM</span>
                                                </div>
                                                <input type="range" min="60" max="120" step="5" value={targetCadence} onChange={e => setTargetCadence(Number(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600 mt-2" />
                                            </div>
                                        ) : (
                                            <div className="space-y-4 bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                                {currentBike.chainrings.length > 1 && (
                                                    <div className="space-y-2">
                                                        <div className="text-xs font-semibold text-slate-500 uppercase flex justify-between">
                                                            <span>Front Ring</span>
                                                            <span className="text-blue-600">{currentBike.chainrings[activeGear.crIdx]}T</span>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            {currentBike.chainrings.map((cr, idx) => (
                                                                <button
                                                                    key={idx}
                                                                    onClick={() => setManualFrontIdx(idx)}
                                                                    className={`flex-1 min-h-[44px] py-2 rounded-md text-sm font-bold transition-colors ${
                                                                        activeGear.crIdx === idx 
                                                                        ? 'bg-blue-600 text-white shadow-sm' 
                                                                        : 'bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100'
                                                                    }`}
                                                                >
                                                                    {cr}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                <div className="space-y-2">
                                                    <div className="flex justify-between items-center text-xs font-semibold text-slate-500 uppercase">
                                                        <span>Rear Cassette</span>
                                                        <span className="text-blue-600">{currentBike.cassette[activeGear.cogIdx]}T</span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {currentBike.cassette.map((cg, idx) => (
                                                            <button
                                                                key={idx}
                                                                onClick={() => setManualRearIdx(idx)}
                                                                className={`flex-1 min-w-[3rem] min-h-[44px] py-2 rounded-md text-sm font-semibold transition-colors ${
                                                                    activeGear.cogIdx === idx 
                                                                    ? 'bg-blue-600 text-white shadow-sm ring-2 ring-blue-600 ring-offset-1' 
                                                                    : 'bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100'
                                                                }`}
                                                            >
                                                                {cg}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-6 shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wide border-b border-slate-200 pb-2">Environment Controls</h3>
                                    
                                    {[
                                        { label: 'Speed', val: speed, unit: 'km/h', set: setSpeed, min: 0, max: 80, step: 1 },
                                        { label: 'Grade', val: grade, unit: '%', set: setGrade, min: -15, max: 20, step: 0.1 },
                                        { label: 'Total Mass', val: mass, unit: 'kg', set: setMass, min: 50, max: 130, step: 1 },
                                        { label: 'Aero (CdA)', val: cda, unit: 'm²', set: setCda, min: 0.15, max: 0.65, step: 0.01 },
                                    ].map((item, i) => (
                                        <div key={i} className="space-y-2">
                                            <div className="flex justify-between text-sm items-center">
                                                <label className="font-medium text-slate-700">{item.label}</label>
                                                <span className="text-slate-900 font-mono bg-white px-2 py-0.5 border border-slate-200 rounded shadow-sm">{item.val} {item.unit}</span>
                                            </div>
                                            <input type="range" min={item.min} max={item.max} step={item.step} value={item.val} onChange={e => item.set(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-600" />
                                        </div>
                                    ))}
                                </div>
                            </aside>

                            <main className="lg:col-span-8 space-y-6">
                                <AnimatedCyclist 
                                    speed={speed} 
                                    grade={grade} 
                                    power={physics.totalWatts} 
                                    cda={cda} 
                                    cadence={actualCadence}
                                    frontTeeth={frontTeeth}
                                    rearTeeth={rearTeeth}
                                />

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {[
                                        { label: 'Cadence', value: Math.round(actualCadence), unit: 'RPM', sub: `Ratio: ${gearRatio.toFixed(2)}`, color: actualCadence > 120 || actualCadence < 50 && speed > 0 ? 'text-red-600' : 'text-emerald-600' },
                                        { label: 'Mech Power', value: Math.round(physics.totalWatts), unit: 'W', sub: `${(physics.totalWatts / mass).toFixed(1)} W/kg`, color: 'text-blue-600' },
                                        { label: 'Metabolic Cost', value: Math.round(physics.pMetabolic), unit: 'W', sub: `${Math.round(physics.pMetabolic * 0.86)} kcal/h`, color: 'text-orange-600' },
                                        { label: 'Resistance', value: Math.round(physics.pAir + physics.pRoll), unit: 'W', sub: 'Aero + Rolling', color: 'text-slate-600' },
                                    ].map((card, i) => (
                                        <div key={i} className="bg-white border border-slate-200 p-5 rounded-xl flex flex-col justify-between shadow-sm">
                                            <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{card.label}</span>
                                            <div className={`mt-2 flex items-baseline gap-1 ${card.color}`}>
                                                <span className="text-3xl font-bold leading-none">{card.value}</span>
                                                <span className="text-sm font-semibold">{card.unit}</span>
                                            </div>
                                            <span className="mt-2 text-xs text-slate-500 font-medium">{card.sub}</span>
                                        </div>
                                    ))}
                                </div>

                                <section className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-6">Energy Flow Diagram</h3>
                                    <div className="relative w-full overflow-x-auto pb-2 custom-scrollbar">
                                        <svg viewBox={`0 0 ${sankey.width} ${sankey.height}`} className="w-full h-auto min-w-[600px]">
                                            {sankey.links.map((l, i) => {
                                                const x1 = 180 + sankey.nodeWidth, x2 = sankey.width - 200;
                                                const curve = (x2 - x1) * 0.4;
                                                const d = `M ${x1} ${l.y1} C ${x1+curve} ${l.y1}, ${x2-curve} ${l.y2}, ${x2} ${l.y2} L ${x2} ${l.y2+l.h} C ${x2-curve} ${l.y2+l.h}, ${x1+curve} ${l.y1+l.h}, ${x1} ${l.y1+l.h} Z`;
                                                return <path key={i} d={d} fill={l.color} opacity={0.15} className="hover:opacity-30 transition-opacity"><title>{Math.round(l.val)}W</title></path>;
                                            })}
                                            {sankey.sources.map((n, i) => (
                                                <g key={i}>
                                                    <rect x={180} y={n.y} width={sankey.nodeWidth} height={n.val * sankey.scale} fill={n.color} rx={3} />
                                                    <text x={170} y={n.y + (n.val * sankey.scale)/2} textAnchor="end" alignmentBaseline="middle" className="fill-slate-800 font-bold text-xs">{n.name}</text>
                                                    <text x={170} y={n.y + (n.val * sankey.scale)/2 + 16} textAnchor="end" alignmentBaseline="middle" className="fill-slate-500 font-mono text-xs">{Math.round(n.val)}W</text>
                                                </g>
                                            ))}
                                            {sankey.sinks.map((n, i) => (
                                                <g key={i}>
                                                    <rect x={sankey.width - 200} y={n.y} width={sankey.nodeWidth} height={n.val * sankey.scale} fill={n.color} rx={3} />
                                                    <text x={sankey.width - 165} y={n.y + (n.val * sankey.scale)/2} textAnchor="start" alignmentBaseline="middle" className="fill-slate-800 font-bold text-xs">{n.name}</text>
                                                    <text x={sankey.width - 165} y={n.y + (n.val * sankey.scale)/2 + 16} textAnchor="start" alignmentBaseline="middle" className="fill-slate-500 font-mono text-xs">{Math.round(n.val)}W</text>
                                                </g>
                                            ))}
                                        </svg>
                                    </div>
                                </section>
                            </main>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
