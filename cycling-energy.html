        const BIKE_ILLUSTRATIONS = {

                torsoAeroDeg: 18, torsoUprightDeg: -26, spine: 56,

            },
            mtb: {

                headTopX: 129, headTopY: 50,

                saddlePath: 'M 56 31 L 76 29 Q 79 29 79 32 L 72 34 Z',
                saddleX: 65, saddleY: 27,
                barStyle: 'flat', stemX: 141, stemY: 48, barX: 151, barY: 48,
                hoodX: 158, hoodY: 48, dropX: 158, dropY: 48,
                hipOffsetX: 1, hipOffsetY: -8, handReachAdjust: 3, handRiseAdjust: 4,
                torsoAeroDeg: -2, torsoUprightDeg: -20, spine: 52,
                femur: 43, tibia: 42, upperArm: 33, lowerArm: 33
            },
            commuter: {
                rearWheelX: 35, frontWheelX: 156, wheelY: 91, wheelRadius: 31, tireStroke: 4.5,
                bbX: 90, bbY: 92, crankRadius: 17,
                seatClusterX: 69, seatClusterY: 45,
                headTopX: 132, headTopY: 42,
                headBottomX: 138, headBottomY: 56,
                seatPostTopX: 63, seatPostTopY: 27,
                saddlePath: 'M 53 29 L 74 27 Q 77 27 77 30 L 70 32 Z',
                saddleX: 62, saddleY: 25,
                barStyle: 'upright', stemX: 142, stemY: 40, barX: 147, barY: 31,
                hoodX: 147, hoodY: 30, dropX: 147, dropY: 30,
                hipOffsetX: 1, hipOffsetY: -9, handReachAdjust: 2, handRiseAdjust: 4,
                torsoAeroDeg: -10, torsoUprightDeg: -58, spine: 50,
                femur: 41, tibia: 41, upperArm: 32, lowerArm: 32
            }
        };

        const AnimatedCyclist = ({ speed, grade, power, cda, cadence, frontTeeth, rearTeeth, bikeId }) => {
            const tilt = Math.atan(grade / 100) * (180 / Math.PI);
            const currentBike = BIKE_TYPES[bikeId];
            const illustration = BIKE_ILLUSTRATIONS[bikeId] || BIKE_ILLUSTRATIONS.road;
            
            const refs = {
                wheel1: useRef(null), wheel2: useRef(null), crank: useRef(null),
                chainTop: useRef(null), chainBottom: useRef(null),
                lLegSkin: useRef(null), lShort: useRef(null), lShoe: useRef(null),
                rLegSkin: useRef(null), rShort: useRef(null), rShoe: useRef(null),
                lArmSkin: useRef(null), lSleeve: useRef(null),
                rArmSkin: useRef(null), rSleeve: useRef(null),
                torso: useRef(null), head: useRef(null)
            };
            
            const paramsRef = useRef({ speed, cda, cadence, frontTeeth, wheelCirc: currentBike.circ, illustration });
            useEffect(() => {
                paramsRef.current = { speed, cda, cadence, frontTeeth, wheelCirc: currentBike.circ, illustration };
            }, [speed, cda, cadence, frontTeeth, currentBike.circ, illustration]);

            useEffect(() => {
                let animationFrameId;
                let lastTime = performance.now();
                let angle = 0;
                let chainOffset = 0;

                const solveKinematics = (x1, y1, x2, y2, L1, L2, bendDir) => {
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const D = Math.sqrt(dx*dx + dy*dy);
                    const D_clamped = Math.min(D, L1 + L2 - 0.01);
                    const alpha = Math.acos((L1*L1 + D_clamped*D_clamped - L2*L2) / (2 * L1 * D_clamped));
                    const beta = Math.atan2(dy, dx);
                    const gamma = beta + (bendDir * alpha); 
                    return { x: x1 + L1 * Math.cos(gamma), y: y1 + L1 * Math.sin(gamma) };
                };

                const renderLoop = (time) => {
                    const deltaTime = time - lastTime;
                    lastTime = time;

                    const view = paramsRef.current;
                    const geometry = view.illustration;

                    const v = view.speed / 3.6; 
                    const wheelRps = v > 0 ? v / view.wheelCirc : 0;
                    const pedalRps = view.cadence / 60;

                    angle += pedalRps * 2 * Math.PI * (deltaTime / 1000);
                    const wheelAngle = (time / 1000) * wheelRps * 360;
                    
                    const crRadius = view.frontTeeth * 0.22;
                    const chainLinearSpeed = pedalRps * 2 * Math.PI * crRadius;
                    chainOffset += chainLinearSpeed * (deltaTime / 1000);

                    const ccx = geometry.bbX;
                    const ccy = geometry.bbY;
                    const cr = geometry.crankRadius;
                    const femur = geometry.femur;
                    const tibia = geometry.tibia;
                    const upperArm = geometry.upperArm;
                    const lowerArm = geometry.lowerArm;
                    const spine = geometry.spine;
                    const baseHipX = geometry.saddleX + geometry.hipOffsetX;
                    const baseHipY = geometry.saddleY + geometry.hipOffsetY;
                    const hipY = baseHipY + Math.sin(angle * 2) * 0.3; 

                    const t = Math.max(0, Math.min(1, (view.cda - 0.2) / 0.3));
                    const angleAero = geometry.torsoAeroDeg * (Math.PI / 180);
                    const angleUpright = geometry.torsoUprightDeg * (Math.PI / 180);
                    const torsoAngle = angleAero + t * (angleUpright - angleAero);
                    
                    const shX = baseHipX + spine * Math.cos(torsoAngle);
                    const shY = hipY + spine * Math.sin(torsoAngle);

                    const handBaseX = geometry.hoodX + (1 - t) * (geometry.dropX - geometry.hoodX);
                    const handBaseY = geometry.hoodY + (1 - t) * (geometry.dropY - geometry.hoodY);
                    const handX = handBaseX + t * geometry.handReachAdjust;
                    const handY = handBaseY - t * geometry.handRiseAdjust;

                    const rpx = ccx + cr * Math.cos(angle);
                    const rpy = ccy + cr * Math.sin(angle);

                    const rKnee = solveKinematics(baseHipX, hipY, rpx, rpy, femur, tibia, -1);
                    const lKnee = solveKinematics(baseHipX, hipY, ccx + cr * Math.cos(angle + Math.PI), ccy + cr * Math.sin(angle + Math.PI), femur, tibia, -1);
                    const elbow = solveKinematics(shX, shY, handX, handY, upperArm, lowerArm, 1);

                    const getShortEnd = (knee) => ({ x: baseHipX + (knee.x - baseHipX) * 0.65, y: hipY + (knee.y - hipY) * 0.65 });
                    const rShortEnd = getShortEnd(rKnee);
                    const lShortEnd = getShortEnd(lKnee);

                    const sleeveEnd = { x: shX + (elbow.x - shX) * 0.35, y: shY + (elbow.y - shY) * 0.35 };

                    if (refs.crank.current) refs.crank.current.setAttribute('d', `M ${ccx + cr * Math.cos(angle + Math.PI)} ${ccy + cr * Math.sin(angle + Math.PI)} L ${rpx} ${rpy}`);
                    if (refs.wheel1.current) refs.wheel1.current.setAttribute('transform', `rotate(${wheelAngle})`);
                    if (refs.wheel2.current) refs.wheel2.current.setAttribute('transform', `rotate(${wheelAngle})`);
                    
                    if (refs.chainTop.current) refs.chainTop.current.setAttribute('stroke-dashoffset', -chainOffset);
                    if (refs.chainBottom.current) refs.chainBottom.current.setAttribute('stroke-dashoffset', chainOffset);

                    const lPedalX = ccx + cr * Math.cos(angle + Math.PI);
                    const lPedalY = ccy + cr * Math.sin(angle + Math.PI);
                    if (refs.lLegSkin.current) refs.lLegSkin.current.setAttribute('d', `M ${lShortEnd.x} ${lShortEnd.y} L ${lKnee.x} ${lKnee.y} L ${lPedalX} ${lPedalY}`);
                    if (refs.lShort.current) refs.lShort.current.setAttribute('d', `M ${baseHipX} ${hipY} L ${lShortEnd.x} ${lShortEnd.y}`);
                    if (refs.lShoe.current) refs.lShoe.current.setAttribute('d', `M ${lPedalX-7} ${lPedalY-4} L ${lPedalX+10} ${lPedalY-1} L ${lPedalX+12} ${lPedalY+4} L ${lPedalX-6} ${lPedalY+5} Z`);

                    if (refs.lArmSkin.current) refs.lArmSkin.current.setAttribute('d', `M ${sleeveEnd.x} ${sleeveEnd.y} L ${elbow.x} ${elbow.y} L ${handX} ${handY}`);
                    if (refs.lSleeve.current) refs.lSleeve.current.setAttribute('d', `M ${shX} ${shY} L ${sleeveEnd.x} ${sleeveEnd.y}`);
                    if (refs.rArmSkin.current) refs.rArmSkin.current.setAttribute('d', `M ${sleeveEnd.x} ${sleeveEnd.y} L ${elbow.x} ${elbow.y} L ${handX} ${handY}`);
                    if (refs.rSleeve.current) refs.rSleeve.current.setAttribute('d', `M ${shX} ${shY} L ${sleeveEnd.x} ${sleeveEnd.y}`);

                    if (refs.rLegSkin.current) refs.rLegSkin.current.setAttribute('d', `M ${rShortEnd.x} ${rShortEnd.y} L ${rKnee.x} ${rKnee.y} L ${rpx} ${rpy}`);
                    if (refs.rShort.current) refs.rShort.current.setAttribute('d', `M ${baseHipX} ${hipY} L ${rShortEnd.x} ${rShortEnd.y}`);
                    if (refs.rShoe.current) refs.rShoe.current.setAttribute('d', `M ${rpx-7} ${rpy-4} L ${rpx+10} ${rpy-1} L ${rpx+12} ${rpy+4} L ${rpx-6} ${rpy+5} Z`);

                    if (refs.torso.current) refs.torso.current.setAttribute('d', `M ${baseHipX} ${hipY} Q ${(baseHipX+shX)/2 + 8} ${(hipY+shY)/2 - 12} ${shX} ${shY}`);
                    
                    if (refs.head.current) {
                        const headDeg = (torsoAngle * 180 / Math.PI) + 40; 
                        refs.head.current.setAttribute('transform', `translate(${shX + 8}, ${shY - 14}) rotate(${headDeg})`);
                    }

                    animationFrameId = requestAnimationFrame(renderLoop);
                };
                animationFrameId = requestAnimationFrame(renderLoop);
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            let riderColor = "#16a085"; // kit teal
            if (power > 450) riderColor = "#c0392b"; // aero red
            else if (power > 300) riderColor = "#c47a0a"; // roll amber

            const skinColor = "#e0c9b0"; 
            const shortColor = "#1a1814";

            const crRadius = frontTeeth * 0.22;
            const cgRadius = rearTeeth * 0.22;
            const innerWheelRadius = illustration.wheelRadius - 2;
            const spokeRadius = illustration.wheelRadius - 2;
            const barStartX = illustration.stemX;
            const barStartY = illustration.stemY;
            const isFlatBar = illustration.barStyle === 'flat';
            const isUprightBar = illustration.barStyle === 'upright';
            const isPursuitBar = illustration.barStyle === 'pursuit';

            return (
                <div className="bg-paper border border-ink-light flex items-center justify-center overflow-hidden relative h-64 sm:h-80 w-full tech-grid">
                    <div className="absolute inset-0 pointer-events-none overflow-hidden">
                        <style>
                            {`@keyframes move-wind { from { transform: translateX(120%); } to { transform: translateX(-120%); } }`}
                        </style>
                        {speed > 5 && [1,2,3].map(i => (
                            <div key={i} className="absolute h-[1px] bg-physics-aero opacity-30" 
                                style={{ top: `${i * 30}%`, width: '40%', left: '100%', animation: `move-wind ${15 / (speed/3.6)}s linear infinite`, animationDelay: `${i * -0.4}s`}}></div>
                        ))}
                    </div>

                    <div className="relative z-10 w-full h-full flex justify-center items-center">
                        <svg viewBox="6 -46 188 180" className="w-full h-full max-h-72 overflow-visible">
                            <g style={{ transform: `rotate(${-tilt}deg)`, transformOrigin: '90px 90px', transition: 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)' }}>
                                <line x1="-200" y1="120" x2="400" y2="120" stroke="#9a9690" strokeWidth="2" strokeDasharray="4 4" />
                                
                                <g transform={`translate(${illustration.rearWheelX}, ${illustration.wheelY})`}>
                                    <g ref={refs.wheel1}>
                                        <circle cx="0" cy="0" r={illustration.wheelRadius} fill="none" stroke="#1a1814" strokeWidth={illustration.tireStroke} /> 
                                        <circle cx="0" cy="0" r={innerWheelRadius} fill="none" stroke="#5a5650" strokeWidth="1" />
                                        {[0, 30, 60, 90, 120, 150].map(deg => (
                                            <line key={deg} x1="0" y1={-spokeRadius} x2="0" y2={spokeRadius} stroke="#9a9690" strokeWidth="0.5" transform={`rotate(${deg})`} />
                                        ))}
                                    </g>
                                </g>
                                <g transform={`translate(${illustration.frontWheelX}, ${illustration.wheelY})`}>
                                    <g ref={refs.wheel2}>
                                        <circle cx="0" cy="0" r={illustration.wheelRadius} fill="none" stroke="#1a1814" strokeWidth={illustration.tireStroke} />
                                        <circle cx="0" cy="0" r={innerWheelRadius} fill="none" stroke="#5a5650" strokeWidth="1" />
                                        {[0, 30, 60, 90, 120, 150].map(deg => (
                                            <line key={deg} x1="0" y1={-spokeRadius} x2="0" y2={spokeRadius} stroke="#9a9690" strokeWidth="0.5" transform={`rotate(${deg})`} />
                                        ))}
                                    </g>
                                </g>

                                <g stroke={currentBike.frameColor} strokeLinecap="round" strokeLinejoin="round" fill="none">
                                    <path d={`M ${illustration.rearWheelX} ${illustration.wheelY} L ${illustration.bbX} ${illustration.bbY}`} strokeWidth="4.5" />
                                    <path d={`M ${illustration.rearWheelX} ${illustration.wheelY} L ${illustration.seatClusterX} ${illustration.seatClusterY}`} strokeWidth="4" />
                                    <path d={`M ${illustration.bbX} ${illustration.bbY} L ${illustration.seatClusterX} ${illustration.seatClusterY} L ${illustration.headTopX} ${illustration.headTopY} L ${illustration.bbX} ${illustration.bbY}`} strokeWidth="6" />
                                    <path d={`M ${illustration.headTopX} ${illustration.headTopY} L ${illustration.headBottomX} ${illustration.headBottomY}`} strokeWidth="5" />
                                    <path d={`M ${illustration.headBottomX} ${illustration.headBottomY} L ${illustration.frontWheelX} ${illustration.wheelY}`} strokeWidth="5" />
                                </g>

                                <g stroke="#1a1814" strokeWidth="3.5" fill="none" strokeLinecap="round">
                                    <path d={`M ${illustration.headTopX} ${illustration.headTopY} L ${barStartX} ${barStartY}`} />
                                    {isFlatBar && <path d={`M ${illustration.barX - 11} ${illustration.barY} L ${illustration.barX + 11} ${illustration.barY}`} />}
                                    {isUprightBar && <path d={`M ${illustration.barX} ${illustration.barY + 12} Q ${illustration.barX - 4} ${illustration.barY + 2} ${illustration.barX} ${illustration.barY - 6}`} />}
                                    {isPursuitBar && <path d={`M ${barStartX} ${barStartY} Q ${illustration.barX - 4} ${illustration.barY - 6} ${illustration.barX} ${illustration.barY}`} />}
                                    {!isFlatBar && !isUprightBar && !isPursuitBar && <path d={`M ${barStartX} ${barStartY} Q ${illustration.barX + 1} ${barStartY} ${illustration.barX} ${illustration.barY}`} />}
                                </g>

                                <g stroke="#9a9690" fill="none">
                                    <line ref={refs.chainTop} x1={illustration.rearWheelX} y1={illustration.wheelY - cgRadius} x2={illustration.bbX} y2={illustration.bbY - crRadius} strokeWidth="2" strokeDasharray="3 2" />
                                    <line ref={refs.chainBottom} x1={illustration.rearWheelX} y1={illustration.wheelY + cgRadius} x2={illustration.bbX} y2={illustration.bbY + crRadius} strokeWidth="2" strokeDasharray="3 2" />
                                    <circle cx={illustration.bbX} cy={illustration.bbY} r={crRadius} stroke="#5a5650" strokeWidth="3" />
                                    <circle cx={illustration.rearWheelX} cy={illustration.wheelY} r={cgRadius} stroke="#5a5650" strokeWidth="3" />
                                </g>

                                <line x1={illustration.seatClusterX} y1={illustration.seatClusterY} x2={illustration.seatPostTopX} y2={illustration.seatPostTopY} stroke="#1a1814" strokeWidth="3" />
                                <path d={illustration.saddlePath} fill="#1a1814" />
                                <circle cx={illustration.saddleX} cy={illustration.saddleY} r="1.5" fill="#1a1814" opacity="0" />

                                <path ref={refs.lArmSkin} stroke={skinColor} strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.6" />
                                <path ref={refs.lSleeve} stroke={riderColor} strokeWidth="8.5" strokeLinecap="round" fill="none" opacity="0.6" />
                                <path ref={refs.lLegSkin} stroke={skinColor} strokeWidth="9" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.6" />
                                <path ref={refs.lShort} stroke={shortColor} strokeWidth="12" strokeLinecap="round" fill="none" opacity="0.8" />
                                <path ref={refs.lShoe} fill="#f4f1eb" stroke="#9a9690" strokeLinejoin="round" opacity="0.8" />
                                
                                <circle cx="90" cy="90" r="4" fill="#1a1814" />
                                <path ref={refs.crank} stroke="#5a5650" strokeWidth="4" strokeLinecap="round" fill="none" />

                                <path ref={refs.rLegSkin} stroke={skinColor} strokeWidth="9.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                                <path ref={refs.rShort} stroke={shortColor} strokeWidth="13" strokeLinecap="round" fill="none" />
                                <path ref={refs.rShoe} fill="#f4f1eb" stroke="#5a5650" strokeLinejoin="round" />
                                
                                <path ref={refs.torso} stroke={riderColor} strokeWidth="18" strokeLinecap="round" fill="none" />
                                
                                <path ref={refs.rArmSkin} stroke={skinColor} strokeWidth="7.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                                <path ref={refs.rSleeve} stroke={riderColor} strokeWidth="9" strokeLinecap="round" fill="none" />
                                
                                <g ref={refs.head}>
                                    <circle cx="0" cy="0" r="7.5" fill={skinColor} />
                                    <path d="M -1 -2 Q 5 -3 8 -1 Q 5 2 -1 0 Z" fill="#1a1814" />
                                    <path d="M 6 -4 C 4 -14, -10 -15, -25 4 Q -10 10, -5 6 L 6 -4 Z" fill={riderColor} />
                                </g>
                            </g>
                        </svg>
                    </div>
                    
                    <div className="absolute bottom-3 left-3 flex gap-2">
                        <div className="bg-paper/90 backdrop-blur px-2 py-1 border border-ink-light text-xs text-ink font-bold" style={{ color: grade > 0 ? '#1a6090' : grade < 0 ? '#c0392b' : 'inherit' }}>
                            {grade.toFixed(1)}% SLOPE
                        </div>
                        <div className="bg-paper/90 backdrop-blur px-2 py-1 border border-ink-light text-xs text-ink flex items-center gap-1">
                            <CogIcon className="w-3 h-3 text-physics-loss" /> {frontTeeth} x {rearTeeth}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [descentControl, setDescentControl] = useState(DEFAULT_SCENARIO.descentControl);
            const [aeroMode, setAeroMode] = useState(DEFAULT_SCENARIO.aeroMode);
            const [raceType, setRaceType] = useState(DEFAULT_SCENARIO.raceType);
            const [riderProfile, setRiderProfile] = useState(DEFAULT_SCENARIO.riderProfile);
            const [effortPercent, setEffortPercent] = useState(DEFAULT_SCENARIO.effortPercent);
            const [grade, setGrade] = useState(DEFAULT_SCENARIO.grade);
            const [riderWeight, setRiderWeight] = useState(DEFAULT_SCENARIO.riderWeight);
            const [manualCda, setManualCda] = useState(DEFAULT_SCENARIO.manualCda);
            const [crr, setCrr] = useState(DEFAULT_SCENARIO.crr);
            const [efficiency, setEfficiency] = useState(DEFAULT_SCENARIO.efficiency);
            const [rho, setRho] = useState(DEFAULT_SCENARIO.rho);
            const [windSpeed, setWindSpeed] = useState(DEFAULT_SCENARIO.windSpeed);

            const [bikeId, setBikeId] = useState(DEFAULT_SCENARIO.bikeId);
            const [shiftMode, setShiftMode] = useState(DEFAULT_SCENARIO.shiftMode);
            const [targetCadence, setTargetCadence] = useState(DEFAULT_SCENARIO.targetCadence);
            const [manualFrontIdx, setManualFrontIdx] = useState(DEFAULT_SCENARIO.manualFrontIdx);
            const [manualRearIdx, setManualRearIdx] = useState(DEFAULT_SCENARIO.manualRearIdx);

            const applyPreset = (p) => {
                setBikeId(p.bike);
                setManualFrontIdx(DEFAULT_SCENARIO.manualFrontIdx);
                setManualRearIdx(DEFAULT_SCENARIO.manualRearIdx);
                setAeroMode('derived');
                setRaceType(p.raceType || DEFAULT_SCENARIO.raceType);
                setRiderProfile(p.riderProfile || DEFAULT_SCENARIO.riderProfile);
                setEffortPercent(p.effortPercent || DEFAULT_SCENARIO.effortPercent);
                setGrade(p.grade); setRiderWeight(p.riderWeight);
                setManualCda(p.cda); setCrr(p.crr); setEfficiency(p.efficiency); setRho(p.rho); setWindSpeed(p.windSpeed ?? DEFAULT_SCENARIO.windSpeed);
            };

            const resolvedCda = useMemo(() => {
                if (aeroMode === 'manual') {
                    return manualCda;
                }

                return estimateCda({ bikeId, raceType });
            }, [aeroMode, manualCda, bikeId, raceType]);

            const riderModel = useMemo(() => calculateTargetPower(riderProfile, effortPercent), [riderProfile, effortPercent]);
            const riderPower = riderModel.targetPower;
            const effortLabel = getEffortLabel(effortPercent);
            const currentBike = BIKE_TYPES[bikeId];
            const allowedRaceTypes = useMemo(() => getAllowedRaceTypes(bikeId), [bikeId]);
            const totalMass = riderWeight + currentBike.bikeWeight;

            useEffect(() => {
                if (!allowedRaceTypes.includes(raceType)) {
                    setRaceType(getDefaultRaceTypeForBike(bikeId));
                }
            }, [bikeId, raceType, allowedRaceTypes]);

            const resolvedSpeed = useMemo(() => {
                return solveSteadyStateSpeed({
                    grade,
                    mass: totalMass,
                    cda: resolvedCda,
                    crr,
                    efficiency,
                    rho,
                    windSpeed,
                    humanEfficiency: riderModel.humanEfficiency,
                    targetRiderPower: riderPower
                });
            }, [riderPower, grade, totalMass, resolvedCda, crr, efficiency, rho, windSpeed, riderModel.humanEfficiency]);

            const activeGear = useMemo(() => {
                return selectActiveGear({
                    bike: BIKE_TYPES[bikeId],
                    shiftMode,
                    manualFrontIdx,
                    manualRearIdx,
                    speed: resolvedSpeed,
                    targetCadence
                });
            }, [bikeId, shiftMode, manualFrontIdx, manualRearIdx, resolvedSpeed, targetCadence]);

            const frontTeeth = currentBike.chainrings[activeGear.crIdx];
            const rearTeeth = currentBike.cassette[activeGear.cogIdx];
            const gearRatio = frontTeeth / rearTeeth;
            const actualCadence = calculateCadence(resolvedSpeed, frontTeeth, rearTeeth, currentBike.circ);

            const physics = useMemo(() => {
                return calculatePhysics({ speed: resolvedSpeed, grade, mass: totalMass, cda: resolvedCda, crr, efficiency, rho, humanEfficiency: riderModel.humanEfficiency, descentControl });
                return calculatePhysics({ speed: resolvedSpeed, grade, mass: totalMass, cda: resolvedCda, crr, efficiency, rho, windSpeed, humanEfficiency: riderModel.humanEfficiency, descentControl });
            }, [resolvedSpeed, grade, totalMass, resolvedCda, crr, efficiency, rho, windSpeed, riderModel.humanEfficiency, descentControl]);

            const windLabel = useMemo(() => {
                if (Math.abs(windSpeed) < 0.5) {
                    return 'Calm';
                }

                return windSpeed > 0 ? 'Headwind' : 'Tailwind';
            }, [windSpeed]);

            const sankey = useMemo(() => buildSankeyData(physics), [physics]);
            const downhillMessage = useMemo(() => {
                if (physics.pBrake > 0.5) {
                    return `Holding ${resolvedSpeed.toFixed(1)} km/h on this descent requires about ${Math.round(physics.pBrake)} W of braking.`;
                }

                if (physics.pExcess > 0.5) {
                    return `At ${resolvedSpeed.toFixed(1)} km/h gravity still exceeds drag by about ${Math.round(physics.pExcess)} W, so the bike would continue accelerating if you do not brake.`;
                }

                return null;
            }, [physics.pBrake, physics.pExcess, resolvedSpeed]);

            return (
                <div className="min-h-screen bg-paper text-ink p-3 sm:p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6 sm:space-y-8">
                        <header className="border-b border-ink-light pb-5 sm:pb-6 mb-6 sm:mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-5 sm:gap-6">
                            <div>
                                <h1 className="text-3xl sm:text-4xl font-sans font-light tracking-tight text-ink">Cycling Power Dynamics</h1>
                                <p className="text-ink-muted mt-2 text-sm">Interactive physics and drivetrain mechanics</p>
                            </div>
                            <div className="flex flex-col items-start lg:items-end w-full lg:w-auto gap-2">
                                <span className="text-xs text-ink-muted uppercase tracking-wider">Bike Type</span>
                                <div className="grid grid-cols-2 sm:flex border border-ink-light w-full sm:overflow-x-auto no-scrollbar">
                                    {Object.values(BIKE_TYPES).map(b => (
                                        <button 
                                            key={b.id} 
                                            onClick={() => {
                                                setBikeId(b.id);
                                                setRaceType(getDefaultRaceTypeForBike(b.id));
                                                setManualFrontIdx(0);
                                                setManualRearIdx(5);
                                            }}
                                            className={`whitespace-nowrap px-3 py-1.5 text-[11px] uppercase tracking-wider transition-colors border-r border-b sm:border-b-0 border-ink-light last:border-r-0 even:border-r-0 sm:even:border-r sm:last:border-r-0 ${bikeId === b.id ? 'bg-ink text-paper' : 'bg-paper text-ink hover:bg-[#ebe7e0]'}`}
                                            style={{ borderTop: bikeId === b.id ? `3px solid ${b.frameColor}` : '3px solid transparent' }}
                                        >
                                            {b.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                            <aside className="lg:col-span-4 space-y-6 sm:space-y-8">
                                <div className="space-y-6">
                                    <h3 className="text-sm text-ink uppercase tracking-wider border-b border-ink-light pb-2 flex items-center gap-2">
                                        <CogIcon className="w-4 h-4 text-physics-loss" /> Drivetrain & Scenarios
                                    </h3>
                                    <div className="space-y-6">
                                        <div className="space-y-3">
                                            <label className="text-xs text-ink-muted uppercase tracking-wider">Rider Profile</label>
                                            <div className="grid grid-cols-2 gap-1.5">
                                                {Object.values(RIDER_PROFILES).map((profile) => (
                                                    <button key={profile.id} onClick={() => setRiderProfile(profile.id)} className={compactGridButtonClass(riderProfile === profile.id)}>
                                                        {profile.name}
                                                    </button>
                                                ))}
                                            </div>
                                            <p className="text-xs text-ink-muted">FTP {Math.round(riderModel.ftp)} W, gross efficiency {riderModel.humanEfficiency.toFixed(1)}%, {riderModel.profile.notes}</p>
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-xs text-ink-muted uppercase tracking-wider">Effort</label>
                                            <div className="space-y-2 pt-2">
                                                <div className="flex justify-between text-xs items-center uppercase tracking-wider font-bold" style={{ color: '#1a1814' }}>
                                                    <label>{effortLabel}</label>
                                                    <span>{effortPercent}% FTP</span>
                                                </div>
                                                <input type="range" min="40" max="130" step="1" value={effortPercent} onChange={e => setEffortPercent(Number(e.target.value))} className="w-full h-1 bg-ink-light appearance-none cursor-pointer" style={{ accentColor: '#1a1814' }} />
                                                <p className="text-xs text-ink-muted">Effort sets target rider power from the selected profile. Speed and mechanical power are solved outputs.</p>
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-xs text-ink-muted uppercase tracking-wider">Aero Model</label>
                                            <SegmentedToggle
                                                value={aeroMode}
                                                onChange={setAeroMode}
                                                options={[
                                                    { value: 'derived', label: 'Derived C_dA' },
                                                    { value: 'manual', label: 'Manual C_dA' }
                                                ]}
                                            />
                                            {aeroMode === 'derived' ? (
                                                <div className="space-y-3 pt-2">
                                                    <label className="text-xs text-ink-muted uppercase tracking-wider">Race Type</label>
                                                    <div className="grid grid-cols-2 gap-1.5">
                                                        {allowedRaceTypes.map((raceId) => {
                                                            const race = RACE_TYPES[raceId];
                                                            return (
                                                            <button key={race.id} onClick={() => setRaceType(race.id)} className={compactGridButtonClass(raceType === race.id)}>
                                                                {race.name}
                                                            </button>
                                                            );
                                                        })}
                                                    </div>
                                                    <p className="text-xs text-ink-muted">CdA is inferred from bike type and event posture. Current estimate: {resolvedCda.toFixed(2)} m².</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-2 pt-2">
                                                    <div className="flex justify-between text-xs items-center uppercase tracking-wider font-bold" style={{ color: '#c0392b' }}>
                                                        <label>C_dA</label>
                                                        <span>{manualCda.toFixed(2)} m²</span>
                                                    </div>
                                                    <input type="range" min="0.15" max="0.65" step="0.01" value={manualCda} onChange={e => setManualCda(Number(e.target.value))} className="w-full h-1 bg-ink-light appearance-none cursor-pointer" style={{ accentColor: '#c0392b' }} />
                                                    <p className="text-xs text-ink-muted">Manual mode overrides bike and race assumptions.</p>
                                                </div>
                                            )}

                                            <label className="text-xs text-ink-muted uppercase tracking-wider">Presets</label>
                                            <div className="grid grid-cols-2 gap-1.5">
                                                {PRESETS.map((p, i) => (
                                                    <button key={i} onClick={() => applyPreset(p)} className="px-2 py-1.5 border border-ink-light text-[11px] leading-tight text-ink hover:bg-ink hover:text-paper transition-colors text-left truncate">
                                                        {p.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-xs text-ink-muted uppercase tracking-wider">Shift Mode</label>
                                            <SegmentedToggle
                                                value={shiftMode}
                                                onChange={setShiftMode}
                                                options={[
                                                    { value: 'auto', label: 'Auto' },
                                                    { value: 'manual', label: 'Manual' }
                                                ]}
                                            />
                                        </div>

                                        {shiftMode === 'auto' ? (
                                            <div className="space-y-2 pt-2">
                                                <div className="flex justify-between text-xs font-bold" style={{ color: '#6c3483' }}>
                                                    <span className="uppercase">Target Cadence</span>
                                                    <span>{targetCadence} RPM</span>
                                                </div>
                                                <input type="range" min="60" max="120" step="5" value={targetCadence} onChange={e => setTargetCadence(Number(e.target.value))} className="w-full h-1 bg-ink-light appearance-none cursor-pointer accent-physics-loss" />
                                            </div>
                                        ) : (
                                            <div className="space-y-4 pt-2">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-xs text-ink-muted uppercase w-12">Front</span>
                                                    <div className="flex flex-1 gap-2">
                                                        {currentBike.chainrings.map((cr, idx) => (
                                                            <button key={idx} onClick={() => setManualFrontIdx(idx)} className={`flex-1 py-1 border transition-colors text-[11px] ${activeGear.crIdx === idx ? 'bg-ink text-paper border-ink' : 'bg-paper text-ink border-ink-light hover:bg-[#ebe7e0]'}`}>{cr}T</button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="flex items-start gap-3">
                                                    <span className="text-xs text-ink-muted uppercase w-12 pt-1.5">Rear</span>
                                                    <div className="flex flex-wrap flex-1 gap-2">
                                                        {currentBike.cassette.map((cg, idx) => (
                                                            <button key={idx} onClick={() => setManualRearIdx(idx)} className={`flex-grow sm:flex-grow-0 min-w-[34px] px-1 py-1 border transition-colors text-[11px] ${activeGear.cogIdx === idx ? 'bg-ink text-paper border-ink' : 'bg-paper text-ink border-ink-light hover:bg-[#ebe7e0]'}`}>{cg}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="space-y-6 pt-4">
                                    <h3 className="text-sm text-ink uppercase tracking-wider border-b border-ink-light pb-2">Environment</h3>
                                    {[
                                        { label: 'Grade', val: grade, unit: '%', set: setGrade, min: -15, max: 20, step: 0.1, accent: '#1a6090' },
                                        { label: 'Rider Weight', val: riderWeight, unit: 'kg', set: setRiderWeight, min: 45, max: 120, step: 1, accent: '#5a5650' },
                                        { label: 'Wind', val: windSpeed, unit: 'km/h', set: setWindSpeed, min: -30, max: 30, step: 1, accent: '#16a085', format: (value) => `${Math.abs(value)} km/h ${Math.abs(value) < 0.5 ? 'Calm' : value > 0 ? 'Headwind' : 'Tailwind'}` },
                                    ].map((item, i) => (
                                        <div key={i} className="space-y-2">
                                            <div className="flex justify-between text-xs items-center uppercase tracking-wider font-bold" style={{ color: item.accent }}>
                                                <label>{item.label}</label>
                                                <span>{item.format ? item.format(item.val) : `${item.val} ${item.unit}`}</span>
                                            </div>
                                            <input type="range" min={item.min} max={item.max} step={item.step} value={item.val} onChange={e => item.set(Number(e.target.value))} className="w-full h-1 bg-ink-light appearance-none cursor-pointer" style={{ accentColor: item.accent }} />
                                        </div>
                                    ))}

                                    <div className="space-y-3 pt-2">
                                        <label className="text-xs text-ink-muted uppercase tracking-wider">Advanced Assumption</label>
                                        <SegmentedToggle
                                            value={descentControl}
                                            onChange={setDescentControl}
                                            options={[
                                                { value: 'brake', label: 'Hold Speed' },
                                                { value: 'coast', label: 'Free Coast' }
                                            ]}
                                        />
                                        <p className="text-xs text-ink-muted">On descents, choose whether extra gravity is modeled as braking heat or as acceleration reserve beyond the current speed.</p>
                                    </div>
                                </div>
                            </aside>

                            <main className="lg:col-span-8 space-y-6 sm:space-y-8">
                                <section className="border border-ink-light bg-[#ebe7e0]/35 p-4 tech-grid">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4 border-b border-ink-light pb-3">
                                        <div>
                                            <h3 className="text-sm text-ink uppercase tracking-wider">Selected Bike</h3>
                                            <p className="text-xs text-ink-muted mt-1">Resolved configuration used for gearing, mass, and aerodynamics.</p>
                                        </div>
                                        <div className="text-left sm:text-right">
                                            <div className="text-lg font-sans font-light text-ink">{currentBike.name}</div>
                                            <div className="text-xs text-ink-muted uppercase tracking-wider">{currentBike.desc}</div>
                                        </div>
                                    </div>
                                    <div className="mt-4 max-w-3xl mx-auto grid grid-cols-6 gap-px border border-ink-light bg-ink-light">
                                        {[
                                            { label: 'Bike Weight', value: currentBike.bikeWeight.toFixed(1), unit: 'kg', sub: 'Typical build' },
                                            { label: 'System Mass', value: totalMass.toFixed(1), unit: 'kg', sub: `${riderWeight.toFixed(1)} + ${currentBike.bikeWeight.toFixed(1)} kg` },
                                            { label: 'Wheel Circ.', value: currentBike.circ.toFixed(3), unit: 'm', sub: 'Rolling circ.' },
                                            { label: 'Drivetrain', value: efficiency.toFixed(0), unit: '%', sub: 'Mech. eff.' },
                                            { label: 'Drive', value: `${currentBike.chainrings.length}x${currentBike.cassette.length}`, unit: '', sub: `${currentBike.chainrings[0]}T-${currentBike.chainrings[currentBike.chainrings.length - 1]}T` },
                                            { label: 'Current Gear', value: `${frontTeeth}×${rearTeeth}`, unit: '', sub: `${gearRatio.toFixed(2)} ratio` }
                                        ].map((item, index) => (
                                            <div key={index} className="bg-paper px-2 py-2.5 flex flex-col justify-between min-h-[82px] min-w-0">
                                                <span className="text-[9px] text-ink-muted uppercase tracking-wide">{item.label}</span>
                                                <div className="mt-2 flex items-baseline gap-1 text-ink">
                                                    <span className="text-[22px] font-normal tracking-tight">{item.value}</span>
                                                    {item.unit && <span className="text-[9px] uppercase tracking-wide">{item.unit}</span>}
                                                </div>
                                                <span className="mt-1.5 text-[9px] text-ink-light leading-tight">{item.sub}</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="border border-ink-light bg-[#ebe7e0]/35 overflow-hidden">
                                    <div className="border-b border-ink-light p-2 sm:p-3 bg-[#ebe7e0]/6">
                                        <div className="max-w-3xl mx-auto grid grid-cols-6 gap-px border border-ink-light bg-ink-light">
                                            {[
                                                { label: 'Speed', value: resolvedSpeed.toFixed(1), unit: 'km/h', sub: 'Solved Output', color: '#1a6090' },
                                                { label: 'C_dA', value: resolvedCda.toFixed(2), unit: 'm²', sub: aeroMode === 'derived' ? RACE_TYPES[raceType].name : 'Manual Override', color: '#c0392b' },
                                                { label: 'Cadence', value: Math.round(actualCadence), unit: 'RPM', sub: `Ratio: ${gearRatio.toFixed(2)}`, color: '#6c3483' },
                                                { label: 'Mech Power', value: Math.round(physics.totalWatts), unit: 'W', sub: `${(physics.totalWatts / riderWeight).toFixed(1)} W/kg rider`, color: '#1a1814' },
                                                { label: 'Metabolic', value: Math.round(physics.pMetabolic), unit: 'W', sub: `${Math.round(physics.pMetabolic * 0.86)} kcal/h`, color: '#5a5650' },
                                                { label: 'Resistance', value: Math.round(physics.pAir + physics.pRoll), unit: 'W', sub: `${windLabel}${Math.abs(windSpeed) >= 0.5 ? ` ${Math.abs(windSpeed)} km/h` : ''}`, color: '#c0392b' },
                                            ].map((card, i) => (
                                                <div key={i} className="px-2 py-2.5 flex flex-col justify-between bg-paper min-h-[82px] min-w-0">
                                                    <span className="text-[9px] text-ink-muted uppercase tracking-wide">{card.label}</span>
                                                    <div className="mt-2 flex items-baseline gap-1 font-bold" style={{ color: card.color }}>
                                                        <span className="text-[22px] font-normal tracking-tight">{card.value}</span>
                                                        <span className="text-[9px]">{card.unit}</span>
                                                    </div>
                                                    <span className="mt-1.5 text-[9px] text-ink-light leading-tight">{card.sub}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="p-3 sm:p-4">
                                        <AnimatedCyclist 
                                            speed={resolvedSpeed} 
                                            grade={grade} 
                                            power={physics.totalWatts} 
                                            cda={resolvedCda} 
                                            cadence={actualCadence}
                                            frontTeeth={frontTeeth}
                                            rearTeeth={rearTeeth}
                                            bikeId={bikeId}
                                        />
                                    </div>
                                </section>

                                {downhillMessage && (
                                    <div className={`border p-4 text-sm ${physics.pExcess > 0.5 ? 'border-physics-kit bg-[#e7f5f1] text-ink' : 'border-ink-light bg-[#ebe7e0]/60 text-ink'}`}>
                                        <span className="font-bold uppercase tracking-wider text-xs block mb-2">Descent Assumption</span>
                                        <p>{downhillMessage}</p>
                                    </div>
                                )}

                                <section className="pt-4">
                                    <h3 className="text-sm text-ink uppercase tracking-wider border-b border-ink-light pb-2 mb-6">Energy Flow (Watts)</h3>
                                    <div className="relative w-full overflow-x-auto pb-2 custom-scrollbar border border-ink-light p-3 sm:p-4 bg-[#ebe7e0]/30 tech-grid">
                                        <svg viewBox={`0 0 ${sankey.width} ${sankey.height}`} className="w-full h-auto min-w-[600px]">
                                            {sankey.links.map((l, i) => {
                                                const x1 = 180 + sankey.nodeWidth, x2 = sankey.width - 200;
                                                const curve = (x2 - x1) * 0.4;
                                                const d = `M ${x1} ${l.y1} C ${x1+curve} ${l.y1}, ${x2-curve} ${l.y2}, ${x2} ${l.y2} L ${x2} ${l.y2+l.h} C ${x2-curve} ${l.y2+l.h}, ${x1+curve} ${l.y1+l.h}, ${x1} ${l.y1+l.h} Z`;
                                                return <path key={i} d={d} fill={l.color} opacity={0.4} className="hover:opacity-80 transition-opacity"><title>{Math.round(l.val)}W</title></path>;
                                            })}
                                            {sankey.sources.map((n, i) => (
                                                <g key={i}>
                                                    <rect x={180} y={n.y} width={sankey.nodeWidth} height={n.val * sankey.scale} fill={n.color} />
                                                    <text x={170} y={n.y + (n.val * sankey.scale)/2} textAnchor="end" alignmentBaseline="middle" className="fill-ink text-xs uppercase font-bold">{n.name}</text>
                                                    <text x={170} y={n.y + (n.val * sankey.scale)/2 + 14} textAnchor="end" alignmentBaseline="middle" className="fill-ink-muted text-xs">{Math.round(n.val)}W</text>
                                                </g>
                                            ))}
                                            {sankey.sinks.map((n, i) => (
                                                <g key={i}>
                                                    <rect x={sankey.width - 200} y={n.y} width={sankey.nodeWidth} height={n.val * sankey.scale} fill={n.color} />
                                                    <text x={sankey.width - 165} y={n.y + (n.val * sankey.scale)/2} textAnchor="start" alignmentBaseline="middle" className="fill-ink text-xs uppercase font-bold">{n.name}</text>
                                                    <text x={sankey.width - 165} y={n.y + (n.val * sankey.scale)/2 + 14} textAnchor="start" alignmentBaseline="middle" className="fill-ink-muted text-xs">{Math.round(n.val)}W</text>
                                                </g>
                                            ))}
                                        </svg>
                                    </div>
                                </section>
                            </main>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
