<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Fisher's Principle simulator showing sex ratio evolution toward 50:50 through frequency-dependent selection.">
    <title>Fisher's Principle Sex Ratio Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        parchment: '#f5efe4',
                        ink: '#16130f',
                        moss: '#2c5f52',
                        ember: '#b34a2b',
                        current: '#355c7d',
                        female: '#c97a52',
                        male: '#2f6f7e',
                        ess: '#6c6a63',
                        line: '#d8cebe',
                        panel: 'rgba(255, 251, 245, 0.86)'
                    },
                    fontFamily: {
                        display: ['Fraunces', 'serif'],
                        sans: ['IBM Plex Sans', 'sans-serif']
                    },
                    boxShadow: {
                        panel: '0 18px 50px rgba(22, 19, 15, 0.08)'
                    }
                }
            }
        };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(179, 74, 43, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(47, 111, 126, 0.16), transparent 28%),
                linear-gradient(180deg, #fbf6ee 0%, #f2eadc 48%, #efe4d1 100%);
        }

        .gene-grid {
            background-image:
                linear-gradient(to right, rgba(22, 19, 15, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(22, 19, 15, 0.05) 1px, transparent 1px);
            background-size: 18px 18px;
        }

        .log-scroll::-webkit-scrollbar {
            width: 9px;
        }

        .log-scroll::-webkit-scrollbar-track {
            background: rgba(22, 19, 15, 0.06);
            border-radius: 999px;
        }

        .log-scroll::-webkit-scrollbar-thumb {
            background: rgba(22, 19, 15, 0.22);
            border-radius: 999px;
        }
    </style>
</head>
<body class="min-h-screen font-sans text-ink antialiased">
    <div id="root"></div>
    <script>
        (async function bootstrapFisherSimulator() {
            try {
                const response = await fetch('./fisher-sex-ratio-simulator.jsx', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Failed to load simulator source: ${response.status}`);
                }

                const source = await response.text();
                const compiled = Babel.transform(source, {
                    presets: ['react']
                }).code;

                (0, eval)(compiled);
            } catch (error) {
                console.error(error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<main style="max-width: 720px; margin: 4rem auto; padding: 2rem; font-family: IBM Plex Sans, sans-serif; color: #16130f;"><h1 style="font-family: Fraunces, serif; font-size: 2.25rem; margin-bottom: 1rem;">Simulation failed to load</h1><p style="line-height: 1.7; color: #4f4a44;">The page shell loaded, but the React component did not compile. Check the browser console for the specific error.</p><p style="margin-top: 1rem;"><a href="../index.html" style="color: #16130f;">Back to home</a></p></main>';
                }
            }
        })();
    </script>
</body>
</html>
